    <text x="171" y="58" font-family="Rajdhani, Arial, sans-serif" font-size="58" font-weight="700" font-style="italic" letter-spacing="0.6" fill="url(#flowBlue)">FLOW</text>
    <rect x="2" y="77" width="14" height="5" rx="1" fill="url(#flowBlue)"/>
    <rect x="24" y="77" width="14" height="5" rx="1" fill="url(#flowBlue)"/>
    <rect x="46" y="77" width="14" height="5" rx="1" fill="url(#flowBlue)"/>
    <rect x="70" y="77" width="198" height="5" rx="1" fill="url(#flowBlue)"/>
  </g>
